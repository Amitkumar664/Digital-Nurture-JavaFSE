<!-- TASK 8 - SAVING PREFERENCES -->
<select id="eventpref" onchange="savepref(this.value)">
  <option value="music">Music Fest</option>
  <option value="sports">Sports Day</option>
</select>
<button onclick="clearpref()">Clear Preferences</button>

<script>
function saveref(val){
     localStorage.setItem("eventpref", val);
     }
window.onload = function(){
  let pref = localStorage.getItem("eventpref");
  if(pref) document.getElementById("eventpref").value = pref;
};
function clearpref(){
     localStorage.clear(); sessionStorage.clear(); 
     }
</script>

<!-- TASK 9 - GEOLOCATION -->
<button onclick="findEvents()">Find Nearby Events</button>
<p id="coords"></p>

<script>
function findEvents(){
  navigator.geolocation.getCurrentPosition(
    pos => document.getElementById("coords").innerText = pos.coords.latitude + ", " + pos.coords.longitude,
    err => alert("Error: " + err.message),
    { enableHighAccuracy: true, timeout: 5000 }
  );
}
</script>
